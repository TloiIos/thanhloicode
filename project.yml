cat > project.yml << 'EOF'
name: FloatingMenuApp
options:
  bundleIdPrefix: com.demo.floatingmenuapp
  deploymentTarget:
    iOS: "15.0"

targets:
  FloatingMenuApp:
    type: application
    platform: iOS
    sources:
      - path: FloatingMenuApp
        excludes:
          - Info.plist
    info:
      path: FloatingMenuApp/Info.plist
      properties:
        UIApplicationSupportsIndirectInputEvents: true
        UILaunchStoryboardName: LaunchScreen
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.demo.floatingmenuapp
        PRODUCT_NAME: FloatingMenuDemo
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGNING_ALLOWED: NO
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGN_IDENTITY: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CLANG_ENABLE_OBJC_ARC: YES
        CLANG_CXX_LANGUAGE_STANDARD: "c++17"
        CLANG_CXX_LIBRARY: "libc++"
        SWIFT_OBJC_BRIDGING_HEADER: "FloatingMenuApp/FloatingMenuApp-Bridging-Header.h"
        HEADER_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/FloatingMenuApp"
          - "$(SRCROOT)/FloatingMenuApp/ESP"
          - "$(SRCROOT)/FloatingMenuApp/Helper"
        LIBRARY_SEARCH_PATHS:
          - "$(inherited)"
          - "$(SRCROOT)/FloatingMenuApp"
EOF
