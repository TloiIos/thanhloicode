name: Build IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Select latest available Xcode
        run: |
          ls /Applications | grep Xcode
          LATEST_XCODE=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          echo "Using: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build unsigned .app
        run: |
          xcodebuild -project FloatingMenuApp.xcodeproj \
            -scheme FloatingMenuApp \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            clean build

      - name: Package as IPA
        run: |
          mkdir -p Payload
          cp -r "build/Build/Products/Release-iphoneos/FloatingMenuDemo.app" Payload/
          zip -r FloatingMenuDemo.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: FloatingMenuDemo-ipa
          path: FloatingMenuDemo.ipa