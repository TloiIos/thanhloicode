<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    
    <!-- ===== PRELOAD & PRECONNECT ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://cdnjs.cloudflare.com" />
    <link rel="dns-prefetch" href="https://api.vilao.ai" />
    
    <!-- ===== FONTS ===== -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    
    <!-- ===== SEO META ===== -->
    <title>Thành Lợi AI - Trợ lý thông minh</title>
    <meta name="description" content="Thành Lợi AI - Trợ lý thông minh" />
    <meta name="keywords" content="AI, Chat, Thành Lợi, Trợ lý AI" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✦</text></svg>" />
    
    <!-- ===== PWA ===== -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#0b0b12" />
    
    <style>
        /* ===== RESET & VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --primary-light: #818cf8;
            --secondary: #8b5cf6;
            --accent: #a78bfa;
            --bg-primary: #0b0b12;
            --bg-secondary: #12121a;
            --bg-tertiary: #16161e;
            --bg-card: #1a1a26;
            --bg-hover: #2a2a3e;
            --text-primary: #e8e8f0;
            --text-secondary: #a0a0b8;
            --text-muted: #6b6b80;
            --border-color: #2a2a3a;
            --shadow-glow: 0 0 40px rgba(99, 102, 241, 0.15);
            --radius: 12px;
            --radius-sm: 8px;
            --radius-full: 50px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --safe-top: env(safe-area-inset-top, 0px);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            margin: 0;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        /* ===== APP CONTAINER ===== */
        .app-container {
            width: 100%;
            height: 100%;
            max-width: 1400px;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        /* ===== LOADING SCREEN ===== */
        .loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-primary);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        .loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loading-screen .spinner {
            width: 44px;
            height: 44px;
            border: 3px solid var(--border-color);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        .loading-screen .logo-text {
            margin-top: 16px;
            font-size: 20px;
            font-weight: 800;
            color: var(--text-secondary);
        }

        .loading-screen .logo-text span {
            color: var(--secondary);
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== TITLE BAR ===== */
        .title-bar {
            height: 48px;
            min-height: 48px;
            background: var(--bg-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 12px;
            flex-shrink: 0;
            user-select: none;
            border-bottom: 1px solid var(--border-color);
            padding-top: var(--safe-top);
        }

        .title-bar-left {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
        }

        .title-bar-left .icon {
            color: var(--secondary);
            font-size: 18px;
            font-weight: 800;
            flex-shrink: 0;
        }

        .title-bar-left .brand-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
        }

        .title-bar-left .brand-name span {
            color: var(--secondary);
        }

        .title-bar-left .version {
            font-size: 10px;
            color: var(--text-muted);
            background: var(--bg-card);
            padding: 1px 8px;
            border-radius: var(--radius-full);
            border: 1px solid var(--border-color);
            flex-shrink: 0;
        }

        .title-bar-right {
            display: flex;
            gap: 4px;
        }

        .window-btn {
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 14px;
            cursor: pointer;
            border-radius: 6px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .window-btn:active {
            transform: scale(0.92);
        }

        .window-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .menu-toggle {
            display: none;
            width: 32px;
            height: 32px;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            font-size: 18px;
            cursor: pointer;
            border-radius: 6px;
            transition: var(--transition);
            align-items: center;
            justify-content: center;
        }

        .menu-toggle:active {
            transform: scale(0.92);
        }

        /* ===== MAIN LAYOUT ===== */
        .main-layout {
            display: flex;
            flex: 1;
            overflow: hidden;
            position: relative;
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 260px;
            background: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border-color);
            transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }

        .sidebar.collapsed {
            width: 56px;
        }

        .sidebar.collapsed .brand-text,
        .sidebar.collapsed .new-chat-btn span,
        .sidebar.collapsed .conv-item .title,
        .sidebar.collapsed .conv-item .delete-btn,
        .sidebar.collapsed .sidebar-footer .status span,
        .sidebar.collapsed .sidebar-footer .actions button span {
            display: none;
        }

        .sidebar.collapsed .new-chat-btn {
            justify-content: center;
            padding: 10px;
        }

        .sidebar.collapsed .new-chat-btn i {
            margin: 0;
        }

        .sidebar-header {
            padding: 14px 14px 10px 14px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg-tertiary);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            min-height: 60px;
        }

        .sidebar-header::before {
            content: '';
            position: absolute;
            top: -30%;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 70px;
            background: radial-gradient(ellipse, rgba(139, 92, 246, 0.12), transparent 70%);
            pointer-events: none;
        }

        .sidebar-header .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 1;
            min-width: 0;
        }

        .sidebar-header .brand .logo {
            font-size: 22px;
            font-weight: 800;
            color: var(--secondary);
            flex-shrink: 0;
        }

        .sidebar-header .brand-text {
            display: flex;
            flex-direction: column;
            transition: var(--transition);
            white-space: nowrap;
            overflow: hidden;
        }

        .sidebar-header .brand-text .name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            line-height: 1.2;
        }

        .sidebar-header .brand-text .sub {
            font-size: 9px;
            color: var(--text-muted);
            font-weight: 400;
            letter-spacing: 0.3px;
        }

        .toggle-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 6px;
            transition: var(--transition);
            z-index: 1;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .toggle-btn:active {
            transform: scale(0.92);
        }

        .toggle-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        /* New Chat Button */
        .new-chat-btn {
            margin: 10px 10px 6px 10px;
            padding: 10px 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            font-family: inherit;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
            min-height: 40px;
            -webkit-tap-highlight-color: transparent;
        }

        .new-chat-btn:active {
            transform: scale(0.96);
        }

        .new-chat-btn:hover {
            background: var(--secondary);
            box-shadow: var(--shadow-glow);
        }

        .new-chat-btn i {
            font-size: 13px;
        }

        /* Conversation List */
        .conv-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px 6px 6px 6px;
            -webkit-overflow-scrolling: touch;
        }

        .conv-list::-webkit-scrollbar {
            width: 3px;
        }

        .conv-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .conv-list::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        .conv-item {
            padding: 9px 10px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2px;
            -webkit-tap-highlight-color: transparent;
            min-height: 38px;
        }

        .conv-item:active {
            transform: scale(0.98);
        }

        .conv-item:hover {
            background: var(--bg-hover);
        }

        .conv-item.active {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }

        .conv-item .title {
            font-size: 12px;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .conv-item .title i {
            font-size: 11px;
            color: var(--text-muted);
        }

        .conv-item.active .title {
            color: var(--text-primary);
        }

        .conv-item .delete-btn {
            width: 22px;
            height: 22px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 4px;
            transition: var(--transition);
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            flex-shrink: 0;
        }

        .conv-item:hover .delete-btn {
            opacity: 1;
        }

        .conv-item .delete-btn:active {
            transform: scale(0.9);
        }

        .conv-item .delete-btn:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* Sidebar Footer */
        .sidebar-footer {
            padding: 10px 14px;
            border-top: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            background: var(--bg-tertiary);
            min-height: 48px;
        }

        .sidebar-footer .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            color: var(--text-muted);
        }

        .sidebar-footer .status .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #34d399;
            animation: pulse-dot 2s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .sidebar-footer .actions {
            display: flex;
            gap: 2px;
        }

        .sidebar-footer .actions button {
            width: 28px;
            height: 28px;
            border: none;
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            border-radius: 4px;
            transition: var(--transition);
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }

        .sidebar-footer .actions button:active {
            transform: scale(0.9);
        }

        .sidebar-footer .actions button:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .sidebar-footer .actions button.danger:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        /* ===== SIDEBAR OVERLAY (Mobile) ===== */
        .sidebar-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 9;
            opacity: 0;
            transition: opacity 0.35s ease;
        }

        .sidebar-overlay.active {
            display: block;
            opacity: 1;
        }

        /* ===== CHAT PANEL ===== */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-primary);
            min-width: 0;
            position: relative;
        }

        /* Chat Header */
        .chat-header {
            padding: 12px 16px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
            min-height: 52px;
            gap: 8px;
        }

        .chat-header::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
            opacity: 0.4;
        }

        .chat-header .info {
            flex: 1;
            min-width: 0;
        }

        .chat-header .info h2 {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-header .info p {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .chat-header .model-badge {
            padding: 3px 10px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 10px;
            color: var(--text-secondary);
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .chat-header .model-badge i {
            color: var(--secondary);
            margin-right: 4px;
        }

        /* Chat Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 14px;
            -webkit-overflow-scrolling: touch;
        }

        .chat-messages::-webkit-scrollbar {
            width: 3px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        /* Message Styles */
        .message {
            display: flex;
            gap: 10px;
            margin-bottom: 14px;
            animation: messageIn 0.3s ease-out;
        }

        @keyframes messageIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message .avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
        }

        .message.user .avatar {
            background: var(--primary);
            color: white;
        }

        .message.ai .avatar {
            background: var(--bg-card);
            color: var(--secondary);
            border: 1px solid var(--border-color);
        }

        .message .bubble {
            max-width: 82%;
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 13px;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .message.user .bubble {
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message.ai .bubble {
            background: var(--bg-card);
            color: var(--text-primary);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .message .bubble .label {
            font-size: 10px;
            font-weight: 600;
            opacity: 0.6;
            margin-bottom: 3px;
            display: block;
        }

        /* Code Block */
        .code-block {
            background: #0d0d14;
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            margin: 6px 0;
            overflow-x: auto;
            position: relative;
            border: 1px solid var(--border-color);
            -webkit-overflow-scrolling: touch;
        }

        .code-block .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
            font-size: 11px;
            color: var(--text-muted);
            flex-wrap: wrap;
            gap: 4px;
        }

        .code-block .code-header .lang {
            color: #34d399;
            font-weight: 600;
        }

        .code-block .code-header .copy-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 11px;
            transition: var(--transition);
            padding: 2px 8px;
            border-radius: 4px;
            -webkit-tap-highlight-color: transparent;
        }

        .code-block .code-header .copy-btn:active {
            transform: scale(0.95);
        }

        .code-block .code-header .copy-btn:hover {
            background: var(--bg-hover);
            color: var(--text-primary);
        }

        .code-block pre {
            margin: 0;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 12px;
            color: #d4d4d4;
            white-space: pre-wrap;
            word-break: break-all;
        }

        /* Thinking */
        .thinking {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .thinking .dots {
            display: flex;
            gap: 4px;
        }

        .thinking .dots span {
            width: 5px;
            height: 5px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: thinkingDot 1.4s infinite;
        }

        .thinking .dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes thinkingDot {
            0%, 60%, 100% { transform: translateY(0); opacity: 0.3; }
            30% { transform: translateY(-5px); opacity: 1; }
        }

        /* Chat Input */
        .chat-input-container {
            padding: 8px 12px 12px 12px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border-color);
            flex-shrink: 0;
            padding-bottom: calc(12px + var(--safe-bottom));
        }

        .chat-input-wrapper {
            display: flex;
            gap: 8px;
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 3px;
            border: 2px solid transparent;
            transition: var(--transition);
        }

        .chat-input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.1);
        }

        .chat-input-wrapper textarea {
            flex: 1;
            background: transparent;
            border: none;
            padding: 8px 12px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 13px;
            resize: none;
            outline: none;
            min-height: 36px;
            max-height: 100px;
            line-height: 1.5;
            -webkit-appearance: none;
        }

        .chat-input-wrapper textarea::placeholder {
            color: var(--text-muted);
        }

        .chat-input-wrapper .send-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: var(--primary);
            color: white;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }

        .chat-input-wrapper .send-btn:active {
            transform: scale(0.92);
        }

        .chat-input-wrapper .send-btn:hover {
            background: var(--secondary);
        }

        .chat-input-wrapper .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 60px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 10px 20px;
            border-radius: var(--radius);
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow-glow);
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 13px;
            font-weight: 500;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
        }

        /* ===== RESPONSIVE ===== */
        /* Tablet */
        @media (max-width: 1024px) {
            .sidebar {
                width: 220px;
            }
            .sidebar.collapsed {
                width: 52px;
            }
            .chat-header .info h2 {
                font-size: 14px;
            }
        }

        /* Mobile */
        @media (max-width: 768px) {
            .menu-toggle {
                display: flex !important;
            }

            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                z-index: 10;
                width: 280px;
                transform: translateX(-100%);
                transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
                border-right: 1px solid var(--border-color);
                box-shadow: 4px 0 30px rgba(0, 0, 0, 0.5);
                padding-top: var(--safe-top);
            }

            .sidebar.open {
                transform: translateX(0);
            }

            .sidebar.collapsed {
                width: 280px;
                transform: translateX(-100%);
            }

            .sidebar.collapsed.open {
                transform: translateX(0);
            }

            .sidebar.collapsed .brand-text,
            .sidebar.collapsed .new-chat-btn span,
            .sidebar.collapsed .conv-item .title,
            .sidebar.collapsed .conv-item .delete-btn,
            .sidebar.collapsed .sidebar-footer .status span,
            .sidebar.collapsed .sidebar-footer .actions button span {
                display: flex;
            }

            .sidebar.collapsed .new-chat-btn {
                justify-content: flex-start;
                padding: 10px 14px;
            }

            .sidebar-overlay.active {
                display: block;
            }

            .title-bar {
                padding: 0 10px;
            }

            .title-bar-left .version {
                display: none;
            }

            .message .bubble {
                max-width: 90%;
                font-size: 13px;
                padding: 9px 12px;
            }

            .chat-header {
                padding: 10px 12px;
                min-height: 44px;
            }

            .chat-header .info h2 {
                font-size: 14px;
            }

            .chat-header .info p {
                font-size: 10px;
            }

            .chat-header .model-badge {
                font-size: 9px;
                padding: 2px 8px;
            }

            .chat-messages {
                padding: 12px 10px;
            }

            .chat-input-container {
                padding: 6px 10px 10px 10px;
            }

            .chat-input-wrapper textarea {
                font-size: 14px;
                min-height: 34px;
                padding: 6px 10px;
            }

            .chat-input-wrapper .send-btn {
                width: 38px;
                height: 38px;
                font-size: 14px;
            }

            .message .avatar {
                width: 28px;
                height: 28px;
                font-size: 12px;
            }
        }

        /* Small Mobile */
        @media (max-width: 480px) {
            .sidebar {
                width: 260px;
            }

            .title-bar-left .brand-name {
                font-size: 13px;
            }

            .title-bar-left .icon {
                font-size: 16px;
            }

            .chat-header .info h2 {
                font-size: 13px;
            }

            .chat-header .model-badge {
                display: none;
            }

            .message .bubble {
                font-size: 12px;
                padding: 8px 11px;
                max-width: 92%;
            }

            .code-block pre {
                font-size: 11px;
            }

            .new-chat-btn {
                font-size: 12px;
                padding: 8px 12px;
                min-height: 36px;
            }

            .conv-item {
                padding: 7px 8px;
                min-height: 34px;
            }

            .conv-item .title {
                font-size: 11px;
            }

            .sidebar-footer {
                padding: 8px 10px;
                min-height: 40px;
            }

            .sidebar-footer .status {
                font-size: 10px;
            }
        }

        /* Notch phones */
        @supports (padding: max(0px)) {
            .title-bar {
                padding-top: max(8px, env(safe-area-inset-top));
                height: max(48px, calc(40px + env(safe-area-inset-top)));
            }
            .chat-input-container {
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }

        /* Touch improvements */
        @media (hover: none) {
            .conv-item .delete-btn {
                opacity: 1;
            }
            .window-btn:hover {
                background: transparent;
            }
            .toggle-btn:hover {
                background: transparent;
            }
            .new-chat-btn:hover {
                background: var(--primary);
                transform: none;
                box-shadow: none;
            }
            .sidebar-footer .actions button:hover {
                background: transparent;
            }
            .conv-item:hover {
                background: transparent;
            }
            .conv-item.active {
                background: var(--bg-card);
            }
        }
    </style>
</head>
<body>

    <!-- ===== LOADING SCREEN ===== -->
    <div class="loading-screen" id="loadingScreen">
        <div class="spinner"></div>
        <div class="logo-text">✦ Thành <span>Lợi AI</span></div>
    </div>

    <!-- ===== TOAST ===== -->
    <div class="toast" id="toast"></div>

    <!-- ===== MOBILE OVERLAY ===== -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- ===== APP ===== -->
    <div class="app-container">

        <!-- Title Bar -->
        <div class="title-bar">
            <div class="title-bar-left">
                <button class="menu-toggle" onclick="toggleMobileSidebar()" aria-label="Menu">
                    <i class="fas fa-bars"></i>
                </button>
                <span class="icon">✦</span>
                <span class="brand-name">Thành <span>Lợi</span> AI</span>
                <span class="version">v1.0</span>
            </div>
            <div class="title-bar-right">
                <button class="window-btn" onclick="window.location.reload()" title="Làm mới" aria-label="Refresh">
                    <i class="fas fa-sync-alt"></i>
                </button>
            </div>
        </div>

        <!-- Main Layout -->
        <div class="main-layout">

            <!-- Sidebar -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <div class="brand">
                        <span class="logo">✦</span>
                        <div class="brand-text">
                            <span class="name">Thành Lợi</span>
                            <span class="sub">AI Assistant</span>
                        </div>
                    </div>
                    <button class="toggle-btn" onclick="toggleSidebar()" title="Thu gọn" aria-label="Toggle sidebar">
                        <i class="fas fa-chevron-left" id="toggleIcon"></i>
                    </button>
                </div>

                <button class="new-chat-btn" onclick="newChat()">
                    <i class="fas fa-plus"></i>
                    <span>Cuộc trò chuyện mới</span>
                </button>

                <div class="conv-list" id="convList"></div>

                <div class="sidebar-footer">
                    <div class="status">
                        <span class="dot"></span>
                        <span>Online</span>
                    </div>
                    <div class="actions">
                        <button onclick="clearMessages()" class="danger" title="Xóa tin nhắn" aria-label="Clear messages">
                            <i class="fas fa-trash-alt"></i>
                        </button>
                        <button onclick="exportChat()" title="Xuất chat" aria-label="Export chat">
                            <i class="fas fa-download"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Chat Panel -->
            <div class="chat-panel">
                <div class="chat-header">
                    <div class="info">
                        <h2 id="chatTitle">💬 Chat với Thành Lợi AI</h2>
                        <p id="chatSubtitle">Trợ lý thông minh</p>
                    </div>
                    <span class="model-badge">
                        <i class="fas fa-robot"></i> DeepSeek V4
                    </span>
                </div>

                <div class="chat-messages" id="chatMessages"></div>

                <div class="chat-input-container">
                    <div class="chat-input-wrapper">
                        <textarea id="chatInput" placeholder="Nhập tin nhắn..." rows="1" enterkeyhint="send"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendMessage()" aria-label="Send message">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- ===== SCRIPT ===== -->
    <script>
        (function() {
            'use strict';

            // ============================================================
            // STATE
            // ============================================================
            const state = {
                conversations: [],
                currentIndex: -1,
                currentHistory: [],
                isSending: false,
                isSidebarCollapsed: false,
                isMobileSidebarOpen: false,
                codeBlocks: {},
                codeIdCounter: 0,
            };

            // API Configuration
            const API_KEY = 'sk-544f92225e50d338088b2d54c52c96a8ae0ea709d3546448ff023fa85fc6befb';
            const API_URL = 'https://api.vilao.ai/v1/chat/completions';
            const MODEL = 'op/deepseek/deepseek-v4-pro';

            // DOM refs
            const $ = (id) => document.getElementById(id);
            const chatMessages = $('chatMessages');
            const chatInput = $('chatInput');
            const sendBtn = $('sendBtn');
            const convList = $('convList');
            const sidebar = $('sidebar');
            const toggleIcon = $('toggleIcon');
            const toast = $('toast');
            const overlay = $('sidebarOverlay');
            const loadingScreen = $('loadingScreen');
            const chatTitle = $('chatTitle');
            const chatSubtitle = $('chatSubtitle');

            // ============================================================
            // HIDE LOADING
            // ============================================================
            function hideLoading() {
                loadingScreen.classList.add('hidden');
                setTimeout(() => {
                    loadingScreen.style.display = 'none';
                }, 500);
            }

            // ============================================================
            // SIDEBAR TOGGLES
            // ============================================================
            function toggleSidebar() {
                if (window.innerWidth <= 768) {
                    toggleMobileSidebar();
                    return;
                }
                state.isSidebarCollapsed = !state.isSidebarCollapsed;
                sidebar.classList.toggle('collapsed');
                toggleIcon.className = state.isSidebarCollapsed ? 'fas fa-chevron-right' : 'fas fa-chevron-left';
            }

            function toggleMobileSidebar() {
                state.isMobileSidebarOpen = !state.isMobileSidebarOpen;
                sidebar.classList.toggle('open');
                overlay.classList.toggle('active');
                document.body.style.overflow = state.isMobileSidebarOpen ? 'hidden' : '';
            }

            function closeMobileSidebar() {
                if (window.innerWidth <= 768) {
                    state.isMobileSidebarOpen = false;
                    sidebar.classList.remove('open');
                    overlay.classList.remove('active');
                    document.body.style.overflow = '';
                }
            }

            // Close sidebar on overlay click
            overlay.addEventListener('click', closeMobileSidebar);

            // Close sidebar on escape key
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeMobileSidebar();
            });

            // ============================================================
            // INIT
            // ============================================================
            document.addEventListener('DOMContentLoaded', () => {
                if (document.readyState === 'complete') {
                    hideLoading();
                } else {
                    window.addEventListener('load', hideLoading);
                    setTimeout(hideLoading, 1000);
                }

                loadConversations();
                if (state.conversations.length === 0) {
                    newChat();
                } else {
                    loadConversation(state.conversations.length - 1);
                }
                renderConvList();

                chatInput.addEventListener('input', autoResize);
                chatInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });

                // Handle window resize for sidebar
                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        if (window.innerWidth > 768 && state.isMobileSidebarOpen) {
                            closeMobileSidebar();
                        }
                    }, 200);
                });

                // Prevent zoom on double tap
                let lastTouchEnd = 0;
                document.addEventListener('touchend', (e) => {
                    const now = Date.now();
                    if (now - lastTouchEnd <= 300) {
                        e.preventDefault();
                    }
                    lastTouchEnd = now;
                }, { passive: false });

                if (!API_KEY || API_KEY === '') {
                    addSystemMessage('⚠️ Vui lòng cấu hình API Key trong code!');
                }
            });

            // ============================================================
            // CONVERSATION MANAGEMENT
            // ============================================================
            function newChat() {
                if (state.currentHistory.length > 0) saveCurrentConversation();

                const conv = {
                    id: state.conversations.length,
                    title: `Chat ${state.conversations.length + 1}`,
                    history: [],
                    created_at: new Date().toLocaleString('vi-VN'),
                };

                state.conversations.push(conv);
                state.currentIndex = state.conversations.length - 1;
                state.currentHistory = [];
                state.codeBlocks = {};
                state.codeIdCounter = 0;

                renderChat();
                renderConvList();
                saveConversations();
                closeMobileSidebar();
            }

            function loadConversation(index) {
                if (index < 0 || index >= state.conversations.length) return;
                saveCurrentConversation();

                state.currentIndex = index;
                state.currentHistory = state.conversations[index].history.slice();
                state.codeBlocks = {};
                state.codeIdCounter = 0;

                renderChat();
                renderConvList();
                closeMobileSidebar();
            }

            function deleteConversation(index) {
                if (!confirm('Xóa cuộc trò chuyện này?')) return;
                state.conversations.splice(index, 1);

                if (state.currentIndex === index) {
                    state.currentIndex = -1;
                    state.currentHistory = [];
                    state.codeBlocks = {};
                    state.codeIdCounter = 0;
                    if (state.conversations.length > 0) {
                        loadConversation(0);
                    } else {
                        newChat();
                    }
                } else if (state.currentIndex > index) {
                    state.currentIndex--;
                }

                renderConvList();
                saveConversations();
            }

            function saveCurrentConversation() {
                if (state.currentIndex >= 0 && state.currentHistory.length > 0) {
                    state.conversations[state.currentIndex].history = state.currentHistory.slice();
                    saveConversations();
                }
            }

            // ============================================================
            // STORAGE
            // ============================================================
            function saveConversations() {
                try {
                    localStorage.setItem('thanhloi_conversations', JSON.stringify(state.conversations));
                } catch (e) { /* ignore */ }
            }

            function loadConversations() {
                try {
                    const data = localStorage.getItem('thanhloi_conversations');
                    if (data) state.conversations = JSON.parse(data);
                } catch (e) {
                    state.conversations = [];
                }
            }

            // ============================================================
            // RENDER
            // ============================================================
            function renderChat() {
                chatMessages.innerHTML = '';

                if (state.currentIndex < 0) {
                    chatMessages.innerHTML = `
                        <div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-muted);padding:20px;">
                            <div style="text-align:center;">
                                <div style="font-size:48px;margin-bottom:12px;">✦</div>
                                <p style="font-size:18px;font-weight:700;color:var(--text-secondary);">Thành Lợi AI</p>
                                <p style="font-size:13px;margin-top:4px;">Trợ lý thông minh của bạn</p>
                                <p style="font-size:12px;margin-top:10px;color:var(--text-muted);">
                                    <i class="fas fa-plus-circle" style="color:var(--primary);"></i> 
                                    Tạo cuộc trò chuyện mới
                                </p>
                            </div>
                        </div>
                    `;
                    return;
                }

                const conv = state.conversations[state.currentIndex];
                if (state.currentHistory.length === 0) {
                    chatMessages.innerHTML = `
                        <div style="padding:6px 0;text-align:center;color:var(--text-muted);font-size:11px;margin-bottom:12px;">
                            <i class="far fa-clock"></i> ${conv.created_at}
                        </div>
                        <div class="message ai">
                            <div class="avatar">✦</div>
                            <div class="bubble">
                                <span class="label">Thành Lợi AI</span>
                                👋 Xin chào! Tôi là Thành Lợi AI, trợ lý thông minh của bạn.<br>
                                Hãy hỏi tôi bất cứ điều gì bạn cần biết!
                            </div>
                        </div>
                    `;
                    chatMessages.scrollTop = chatMessages.scrollHeight;
                    return;
                }

                let html = `
                    <div style="padding:6px 0;text-align:center;color:var(--text-muted);font-size:11px;margin-bottom:12px;">
                        <i class="far fa-clock"></i> ${conv.created_at}
                    </div>
                `;

                for (const msg of state.currentHistory) {
                    if (msg.role === 'user') {
                        html += `
                            <div class="message user">
                                <div class="avatar"><i class="fas fa-user"></i></div>
                                <div class="bubble">
                                    <span class="label">Bạn</span>
                                    ${escapeHtml(msg.content)}
                                </div>
                            </div>
                        `;
                    } else {
                        html += `
                            <div class="message ai">
                                <div class="avatar">✦</div>
                                <div class="bubble">
                                    <span class="label">Thành Lợi AI</span>
                                    ${renderContent(msg.content)}
                                </div>
                            </div>
                        `;
                    }
                }

                chatMessages.innerHTML = html;
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function renderContent(text) {
                const parts = text.split(/(```[\s\S]*?```)/);
                let html = '';

                for (const part of parts) {
                    if (!part.trim()) continue;

                    if (part.startsWith('```') && part.endsWith('```')) {
                        const codeContent = part.slice(3, -3).trim();
                        const lines = codeContent.split('\n');
                        const lang = lines[0] || '';
                        const codeLines = lines.slice(1).join('\n');

                        state.codeIdCounter++;
                        const codeId = state.codeIdCounter;
                        state.codeBlocks[codeId] = codeLines;

                        html += `
                            <div class="code-block">
                                <div class="code-header">
                                    <span class="lang">📝 ${lang}</span>
                                    <button class="copy-btn" onclick="copyCode(${codeId})">
                                        <i class="fas fa-copy"></i> Sao chép
                                    </button>
                                </div>
                                <pre>${escapeHtml(codeLines)}</pre>
                            </div>
                        `;
                    } else {
                        html += `<span>${escapeHtml(part)}</span>`;
                    }
                }

                return html;
            }

            function renderConvList() {
                if (state.conversations.length === 0) {
                    convList.innerHTML = `
                        <div style="padding:20px;text-align:center;color:var(--text-muted);font-size:12px;">
                            <i class="far fa-comment" style="font-size:22px;display:block;margin-bottom:6px;"></i>
                            Chưa có cuộc trò chuyện
                        </div>
                    `;
                    return;
                }

                let html = '';
                for (let i = 0; i < state.conversations.length; i++) {
                    const conv = state.conversations[i];
                    const active = i === state.currentIndex ? 'active' : '';
                    html += `
                        <div class="conv-item ${active}" onclick="loadConversation(${i})">
                            <span class="title"><i class="far fa-comment-dots"></i>${escapeHtml(conv.title)}</span>
                            <button class="delete-btn" onclick="event.stopPropagation();deleteConversation(${i})" aria-label="Delete conversation">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    `;
                }
                convList.innerHTML = html;
            }

            // ============================================================
            // MESSAGES
            // ============================================================
            function addMessage(content, role) {
                state.currentHistory.push({ role, content });
                renderChat();
                saveCurrentConversation();
                renderConvList();
            }

            function addSystemMessage(text) {
                const html = `
                    <div class="message ai">
                        <div class="avatar">⚠️</div>
                        <div class="bubble" style="border-color:#f59e0b;">
                            <span class="label" style="color:#f59e0b;">Hệ thống</span>
                            ${escapeHtml(text)}
                        </div>
                    </div>
                `;
                chatMessages.insertAdjacentHTML('beforeend', html);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function showThinking() {
                const html = `
                    <div class="message ai" id="thinkingMsg">
                        <div class="avatar">✦</div>
                        <div class="bubble">
                            <div class="thinking">
                                <span>AI đang suy nghĩ</span>
                                <div class="dots">
                                    <span></span><span></span><span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                chatMessages.insertAdjacentHTML('beforeend', html);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function removeThinking() {
                const el = document.getElementById('thinkingMsg');
                if (el) el.remove();
            }

            // ============================================================
            // SEND MESSAGE
            // ============================================================
            async function sendMessage() {
                if (state.isSending) return;

                const input = chatInput.value.trim();
                if (!input) return;

                if (!API_KEY || API_KEY === '') {
                    addSystemMessage('⚠️ Vui lòng cấu hình API Key trong code!');
                    return;
                }

                state.isSending = true;
                sendBtn.disabled = true;
                chatInput.disabled = true;

                if (state.currentHistory.length === 0 && state.currentIndex >= 0) {
                    const title = input.length > 30 ? input.slice(0, 30) + '...' : input;
                    state.conversations[state.currentIndex].title = title;
                    renderConvList();
                    saveConversations();
                }

                addMessage(input, 'user');
                chatInput.value = '';
                autoResize();

                showThinking();

                try {
                    await askAI(input);
                } catch (error) {
                    removeThinking();
                    addSystemMessage(`❌ Lỗi: ${error.message}`);
                } finally {
                    state.isSending = false;
                    sendBtn.disabled = false;
                    chatInput.disabled = false;
                    chatInput.focus();
                }
            }

            async function askAI(userInput) {
                const messages = state.currentHistory.map(m => ({
                    role: m.role,
                    content: m.content
                }));

                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${API_KEY}`,
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: messages,
                        stream: false,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    if (data.error?.message?.includes('API key')) {
                        throw new Error('API Key không hợp lệ! Vui lòng kiểm tra lại.');
                    }
                    throw new Error(data.error?.message || 'Lỗi không xác định từ API');
                }

                const aiText = data.choices?.[0]?.message?.content;
                if (!aiText) throw new Error('Không nhận được phản hồi từ AI');

                removeThinking();
                addMessage(aiText, 'assistant');
            }

            // ============================================================
            // UTILITIES
            // ============================================================
            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function autoResize() {
                chatInput.style.height = 'auto';
                chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
            }

            function copyCode(codeId) {
                const code = state.codeBlocks[codeId];
                if (code) {
                    if (navigator.clipboard) {
                        navigator.clipboard.writeText(code).then(() => {
                            showToast(`✅ Đã sao chép code #${codeId}!`);
                        }).catch(() => fallbackCopy(code));
                    } else {
                        fallbackCopy(code);
                    }
                }
            }

            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                textarea.style.top = '-9999px';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast(`✅ Đã sao chép code!`);
                } catch (e) {
                    showToast('❌ Không thể sao chép');
                }
                document.body.removeChild(textarea);
            }

            function showToast(message) {
                toast.textContent = message;
                toast.classList.add('show');
                clearTimeout(toast._timer);
                toast._timer = setTimeout(() => {
                    toast.classList.remove('show');
                }, 2500);
            }

            function clearMessages() {
                if (state.currentIndex < 0) return;
                if (!confirm('Xóa tất cả tin nhắn trong cuộc trò chuyện này?')) return;

                state.currentHistory = [];
                state.conversations[state.currentIndex].history = [];
                state.codeBlocks = {};
                state.codeIdCounter = 0;
                saveConversations();
                renderChat();
                renderConvList();
                showToast('🗑️ Đã xóa tất cả tin nhắn');
            }

            function exportChat() {
                if (state.currentHistory.length === 0) {
                    showToast('Không có tin nhắn để xuất');
                    return;
                }

                let text = '✦ Thành Lợi AI - Xuất cuộc trò chuyện\n';
                text += `Xuất: ${new Date().toLocaleString('vi-VN')}\n`;
                text += '='.repeat(60) + '\n\n';

                for (const msg of state.currentHistory) {
                    if (msg.role === 'user') {
                        text += `🧑 Bạn:\n${msg.content}\n\n`;
                    } else {
                        text += `🤖 Thành Lợi AI:\n${msg.content}\n\n`;
                    }
                }

                const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `thanhloi_chat_${Date.now()}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('✅ Đã xuất cuộc trò chuyện!');
            }

            // ============================================================
            // EXPOSE GLOBALS
            // ============================================================
            window.toggleSidebar = toggleSidebar;
            window.toggleMobileSidebar = toggleMobileSidebar;
            window.closeMobileSidebar = closeMobileSidebar;
            window.newChat = newChat;
            window.loadConversation = loadConversation;
            window.deleteConversation = deleteConversation;
            window.sendMessage = sendMessage;
            window.clearMessages = clearMessages;
            window.exportChat = exportChat;
            window.copyCode = copyCode;

            // Handle visibility change to save state
            document.addEventListener('visibilitychange', () => {
                if (document.hidden) {
                    saveCurrentConversation();
                }
            });

        })();
    </script>

</body>
</html>
