                    imagePreviewContainer.innerHTML = '';
                    updateImageBadge();
                    return;
                }
                // Preview already shown via showImagePreview
                updateImageBadge();
            }

            function clearPendingImages() {
                state.pendingImages = [];
                imagePreviewContainer.innerHTML = '';
                imagePreviewContainer.style.display = 'none';
                updateImageBadge();
                uploadProgress.style.display = 'none';
                progressBar.style.width = '0%';
            }

            function showUploadProgress(percent) {
                uploadProgress.style.display = 'block';
                progressBar.style.width = Math.min(percent, 100) + '%';
                if (percent >= 100) {
                    setTimeout(() => {
                        uploadProgress.style.display = 'none';
                        progressBar.style.width = '0%';
                    }, 500);
                }
            }

            // ============================================================
            // RENDER FUNCTIONS
            // ============================================================
            function renderChat() {
                chatMessages.innerHTML = '';

                if (state.currentIndex < 0 || state.conversations.length === 0) {
                    chatMessages.innerHTML = `
                        <div class="welcome-screen">
                            <div class="icon">✦</div>
                            <h2>Thành <span>Lợi</span> AI</h2>
                            <p>Trợ lý thông minh đa mô hình với sức mạnh của DeepSeek V4 Pro và ChatGPT</p>
                            <div class="features">
                                <div class="feature"><i class="fas fa-brain"></i> Đa mô hình</div>
                                <div class="feature"><i class="fas fa-code"></i> Hỗ trợ code</div>
                                <div class="feature"><i class="fas fa-image"></i> Gửi ảnh</div>
                                <div class="feature"><i class="fas fa-bolt"></i> Phản hồi nhanh</div>
                            </div>
                            <br>
                            <button class="new-chat-btn" onclick="newChat()" style="margin:0 auto;padding:14px 32px;font-size:14px;">
                                <i class="fas fa-plus"></i> Bắt đầu trò chuyện
                            </button>
                        </div>
                    `;
                    updateChatTitle();
                    return;
                }

                const conv = state.conversations[state.currentIndex];
                
                let html = `
                    <div class="timestamp">
                        <i class="far fa-calendar-alt"></i> 
                        ${formatDate(conv.created_at)} • ${conv.history.length} tin nhắn
                    </div>
                `;

                if (state.currentHistory.length === 0) {
                    html += `
                        <div class="message ai">
                            <div class="avatar">✦</div>
                            <div class="bubble">
                                <span class="label">${getModelDisplay(state.currentModel).icon} Thành Lợi AI</span>
                                👋 Xin chào! Tôi là <strong>Thành Lợi AI Pro</strong>, trợ lý thông minh đa mô hình.<br><br>
                                Tôi có thể giúp bạn với:
                                <ul style="margin-top:6px;padding-left:20px;color:var(--text-secondary);">
                                    <li>🧠 Trả lời câu hỏi và tư vấn</li>
                                    <li>💻 Viết và sửa code</li>
                                    <li>📝 Soạn thảo văn bản</li>
                                    <li>📸 Nhận và phân tích ảnh</li>
                                </ul>
                                <br>
                                Hãy hỏi tôi bất cứ điều gì bạn cần biết!
                            </div>
                        </div>
                    `;
                } else {
                    for (const msg of state.currentHistory) {
                        if (msg.role === 'user') {
                            html += `
                                <div class="message user">
                                    <div class="avatar"><i class="fas fa-user"></i></div>
                                    <div class="bubble">
                                        <span class="label">Bạn</span>
                                        ${renderMessageContent(msg.content)}
                                    </div>
                                </div>
                            `;
                        } else {
                            html += `
                                <div class="message ai">
                                    <div class="avatar">✦</div>
                                    <div class="bubble">
                                        <span class="label">${getModelDisplay(state.currentModel).icon} Thành Lợi AI</span>
                                        ${renderMessageContent(msg.content)}
                                    </div>
                                </div>
                            `;
                        }
                    }
                }

                chatMessages.innerHTML = html;
                chatMessages.scrollTop = chatMessages.scrollHeight;
                updateChatTitle();
            }

            function renderMessageContent(text) {
                // Check for image markdown ![alt](url)
                const imageRegex = /!\[(.*?)\]\((.*?)\)/g;
                let processedText = text;
                let match;
                const images = [];
                
                while ((match = imageRegex.exec(text)) !== null) {
                    images.push({
                        alt: match[1],
                        url: match[2],
                        index: match.index,
                        full: match[0]
                    });
                }
                
                // If there are images, render them
                if (images.length > 0) {
                    let html = '';
                    let lastIndex = 0;
                    for (const img of images) {
                        html += escapeHtml(text.substring(lastIndex, img.index));
                        const isGrid = images.length > 1;
                        html += `
                            <div class="image-container" onclick="window.open('${escapeHtml(img.url)}', '_blank')">
                                <img src="${escapeHtml(img.url)}" alt="${escapeHtml(img.alt || 'Ảnh')}" loading="lazy" />
                                <div class="file-info">
                                    <span class="name">${escapeHtml(img.alt || 'Ảnh')}</span>
                                </div>
                            </div>
                        `;
                        lastIndex = img.index + img.full.length;
                    }
                    html += escapeHtml(text.substring(lastIndex));
                    return html;
                }

                // Parse code blocks
                const parts = text.split(/(```[\s\S]*?```)/);
                let html = '';

                for (const part of parts) {
                    if (!part.trim()) continue;

                    if (part.startsWith('```') && part.endsWith('```')) {
                        const codeContent = part.slice(3, -3).trim();
                        const lines = codeContent.split('\n');
                        const lang = lines[0] || 'text';
                        const codeLines = lines.slice(1).join('\n');

                        state.codeIdCounter++;
                        const codeId = state.codeIdCounter;
                        state.codeBlocks[codeId] = codeLines;

                        html += `
                            <div class="code-block">
                                <div class="code-header">
                                    <span class="lang">📝 ${escapeHtml(lang)}</span>
                                    <button class="copy-btn" onclick="copyCode(${codeId})">
                                        <i class="fas fa-copy"></i> Sao chép
                                    </button>
                                </div>
                                <pre>${escapeHtml(codeLines)}</pre>
                            </div>
                        `;
                    } else {
                        const inlineParts = part.split(/(`[^`]+`)/);
                        for (const inlinePart of inlineParts) {
                            if (inlinePart.startsWith('`') && inlinePart.endsWith('`')) {
                                html += `<code style="background:var(--bg-tertiary);padding:2px 6px;border-radius:4px;font-size:0.9em;">${escapeHtml(inlinePart.slice(1, -1))}</code>`;
                            } else {
                                html += escapeHtml(inlinePart).replace(/\n/g, '<br>');
                            }
                        }
                    }
                }

                return html;
            }

            function renderConvList() {
                if (state.conversations.length === 0) {
                    convList.innerHTML = `
                        <div style="padding:30px 16px;text-align:center;color:var(--text-muted);font-size:12px;">
                            <i class="far fa-comment" style="font-size:28px;display:block;margin-bottom:10px;opacity:0.3;"></i>
                            Chưa có cuộc trò chuyện<br>
                            <span style="font-size:11px;color:var(--text-muted);">Nhấn "+" để bắt đầu</span>
                        </div>
                    `;
                    return;
                }

                let html = '';
                for (let i = 0; i < state.conversations.length; i++) {
                    const conv = state.conversations[i];
                    const active = i === state.currentIndex ? 'active' : '';
                    const icon = active ? 'fa-comment-dots' : 'fa-comment';
                    const time = formatTime(conv.updated_at || conv.created_at);
                    html += `
                        <div class="conv-item ${active}" onclick="loadConversation(${i})">
                            <span class="conv-icon"><i class="fas ${icon}"></i></span>
                            <span class="title">
                                ${escapeHtml(conv.title)}
                                <span class="time">${time}</span>
                            </span>
                            <button class="delete-btn" onclick="event.stopPropagation();deleteConversation(${i})" aria-label="Delete conversation">
                                <i class="fas fa-times"></i>
                            </button>
                        </div>
                    `;
                }
                convList.innerHTML = html;
            }

            // ============================================================
            // MESSAGE HANDLING
            // ============================================================
            function addMessage(content, role, images = []) {
                let messageContent = content;
                // Add image markdown if images were sent
                if (images && images.length > 0) {
                    for (const img of images) {
                        messageContent += `\n![${img.name || 'Ảnh'}](${img.data})`;
                    }
                }
                state.currentHistory.push({ role, content: messageContent });
                renderChat();
                saveCurrentConversation();
                renderConvList();
            }

            function addSystemMessage(text, type = 'warning') {
                const html = `
                    <div class="message ai">
                        <div class="avatar">${type === 'error' ? '❌' : '⚠️'}</div>
                        <div class="bubble" style="border-color:${type === 'error' ? 'var(--danger)' : 'var(--warning)'};">
                            <span class="label" style="color:${type === 'error' ? 'var(--danger)' : 'var(--warning)'};">Hệ thống</span>
                            ${escapeHtml(text)}
                        </div>
                    </div>
                `;
                chatMessages.insertAdjacentHTML('beforeend', html);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function showThinking() {
                const html = `
                    <div class="message ai" id="thinkingMsg">
                        <div class="avatar">✦</div>
                        <div class="bubble">
                            <div class="thinking">
                                <span>${getModelDisplay(state.currentModel).icon} AI đang suy nghĩ</span>
                                <div class="dots">
                                    <span></span><span></span><span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                chatMessages.insertAdjacentHTML('beforeend', html);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function removeThinking() {
                const el = document.getElementById('thinkingMsg');
                if (el) el.remove();
            }

            function clearInput() {
                chatInput.value = '';
                autoResize();
                updateCharCount();
                chatInput.focus();
            }

            function updateCharCount() {
                const len = chatInput.value.length;
                charCount.textContent = len > 0 ? len : '';
                charCount.style.color = len > CONFIG.MAX_INPUT_LENGTH * 0.9 ? 'var(--warning)' : 'var(--text-muted)';
                if (len > CONFIG.MAX_INPUT_LENGTH) {
                    chatInput.value = chatInput.value.slice(0, CONFIG.MAX_INPUT_LENGTH);
                    updateCharCount();
                    showToast(`⚠️ Giới hạn ${CONFIG.MAX_INPUT_LENGTH} ký tự`, 'warning');
                }
            }

            // ============================================================
            // SEND MESSAGE - WITH IMAGE SUPPORT
            // ============================================================
            async function sendMessage() {
                if (state.isSending) return;

                const input = chatInput.value.trim();
                const hasImages = state.pendingImages.length > 0;

                if (!input && !hasImages) {
                    showToast('📝 Vui lòng nhập tin nhắn hoặc chọn ảnh', 'warning');
                    return;
                }

                if (input.length > CONFIG.MAX_INPUT_LENGTH) {
                    showToast(`⚠️ Tin nhắn quá dài (${CONFIG.MAX_INPUT_LENGTH} ký tự tối đa)`, 'error');
                    return;
                }

                const apiKey = getApiKey();
                if (!apiKey || apiKey === '') {
                    addSystemMessage('⚠️ Vui lòng cấu hình API Key trong code!', 'error');
                    return;
                }

                state.isSending = true;
                sendBtn.disabled = true;
                chatInput.disabled = true;
                chatInput.style.opacity = '0.6';

                // Auto-create title if first message
                if (state.currentHistory.length === 0 && state.currentIndex >= 0) {
                    const title = input.length > 35 ? input.slice(0, 35) + '...' : (input || 'Chat có ảnh');
                    state.conversations[state.currentIndex].title = title;
                    renderConvList();
                    saveData();
                }

                // Convert images to base64
                let imageData = [];
                if (hasImages) {
                    showUploadProgress(10);
                    imageData = await Promise.all(state.pendingImages.map((file, index) => {
                        return new Promise((resolve) => {
                            const reader = new FileReader();
                            reader.onload = function(e) {
                                showUploadProgress(10 + ((index + 1) / state.pendingImages.length) * 80);
                                resolve({
                                    name: file.name,
                                    size: file.size,
                                    type: file.type,
                                    data: e.target.result
                                });
                            };
                            reader.readAsDataURL(file);
                        });
                    }));
                    showUploadProgress(100);
                    
                    // Store for later use
                    state.imageData = imageData;
                }

                // Build message content
                let messageContent = input;
                if (hasImages) {
                    const count = imageData.length;
                    messageContent = input + (input ? '\n\n' : '') + `📸 Đã gửi ${count} ảnh`;
                    // Add image info
                    for (const img of imageData) {
                        messageContent += `\n- ${img.name} (${formatFileSize(img.size)})`;
                    }
                }

                // Add user message with images
                addMessage(messageContent, 'user', imageData);

                // Clear input and images
                chatInput.value = '';
                autoResize();
                updateCharCount();
                clearPendingImages();

                showThinking();

                try {
                    await askAI(input, imageData);
                } catch (error) {
                    removeThinking();
                    addSystemMessage(`❌ Lỗi: ${error.message}`, 'error');
                    showToast(`❌ ${error.message}`, 'error');
                } finally {
                    state.isSending = false;
                    sendBtn.disabled = false;
                    chatInput.disabled = false;
                    chatInput.style.opacity = '1';
                    chatInput.focus();
                    state.imageData = [];
                }
            }

            async function askAI(userInput, imageData = []) {
                const messages = state.currentHistory.map(m => ({
                    role: m.role,
                    content: m.content
                }));

                const systemPrompt = `Bạn là Thành Lợi AI Pro, một trợ lý thông minh đa mô hình.
Bạn có khả năng:
- Trả lời câu hỏi chính xác và chi tiết
- Viết và sửa code với giải thích rõ ràng
- Tư vấn và đưa ra lời khuyên hữu ích
- Hỗ trợ nhiều ngôn ngữ
- Phân tích và mô tả ảnh (nếu được gửi kèm)

Hãy trả lời một cách thân thiện, chuyên nghiệp và hữu ích.`;

                // Build message with image context
                let userMessage = userInput;
                if (imageData.length > 0) {
                    userMessage += `\n\n[Đã gửi ${imageData.length} ảnh]`;
                    for (const img of imageData) {
                        userMessage += `\n- ${img.name} (${formatFileSize(img.size)}, ${img.type})`;
                    }
                    userMessage += `\n\nVui lòng phân tích và mô tả nội dung của các ảnh này.`;
                }

                const fullMessages = [
                    { role: 'system', content: systemPrompt },
                    ...messages.slice(0, -1),
                    { role: 'user', content: userMessage }
                ];

                const response = await fetch(CONFIG.API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getApiKey()}`,
                    },
                    body: JSON.stringify({
                        model: state.currentModel,
                        messages: fullMessages,
                        stream: false,
                        temperature: 0.7,
                        max_tokens: 4096,
                    }),
                });

                const data = await response.json();

                if (!response.ok) {
                    if (data.error?.message?.includes('API key')) {
                        throw new Error('API Key không hợp lệ! Vui lòng kiểm tra lại.');
                    }
                    throw new Error(data.error?.message || 'Lỗi không xác định từ API');
                }

                const aiText = data.choices?.[0]?.message?.content;
                if (!aiText) throw new Error('Không nhận được phản hồi từ AI');

                removeThinking();
                addMessage(aiText, 'assistant');
            }

            // ============================================================
            // CODE COPY
            // ============================================================
            function copyCode(codeId) {
                const code = state.codeBlocks[codeId];
                if (!code) {
                    showToast('❌ Không tìm thấy code', 'error');
                    return;
                }

                if (navigator.clipboard && navigator.clipboard.writeText) {
                    navigator.clipboard.writeText(code).then(() => {
                        showToast(`✅ Đã sao chép code #${codeId}`, 'success');
                        const btn = document.querySelector(`.copy-btn[onclick*="${codeId}"]`);
                        if (btn) {
                            btn.classList.add('copied');
                            btn.innerHTML = '<i class="fas fa-check"></i> Đã sao chép';
                            setTimeout(() => {
                                btn.classList.remove('copied');
                                btn.innerHTML = '<i class="fas fa-copy"></i> Sao chép';
                            }, 2000);
                        }
                    }).catch(() => fallbackCopy(code));
                } else {
                    fallbackCopy(code);
                }
            }

            function fallbackCopy(text) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                textarea.style.top = '-9999px';
                textarea.style.width = '1px';
                textarea.style.height = '1px';
                document.body.appendChild(textarea);
                textarea.select();
                try {
                    document.execCommand('copy');
                    showToast('✅ Đã sao chép code!', 'success');
                } catch (e) {
                    showToast('❌ Không thể sao chép', 'error');
                }
                document.body.removeChild(textarea);
            }

            // ============================================================
            // EXPORT CHAT
            // ============================================================
            function exportChat() {
                if (state.currentHistory.length === 0) {
                    showToast('📭 Không có tin nhắn để xuất', 'warning');
                    return;
                }

                const conv = state.conversations[state.currentIndex];
                let text = '✦ Thành Lợi AI Pro - Xuất cuộc trò chuyện\n';
                text += `${'='.repeat(60)}\n`;
                text += `Tiêu đề: ${conv.title}\n`;
                text += `Ngày tạo: ${new Date(conv.created_at).toLocaleString('vi-VN')}\n`;
                text += `Số tin nhắn: ${conv.history.length}\n`;
                text += `Model: ${getModelDisplay(state.currentModel).name}\n`;
                text += `${'='.repeat(60)}\n\n`;

                for (const msg of state.currentHistory) {
                    if (msg.role === 'user') {
                        text += `🧑 Bạn:\n${msg.content}\n\n`;
                    } else {
                        text += `🤖 Thành Lợi AI (${getModelDisplay(state.currentModel).name}):\n${msg.content}\n\n`;
                    }
                }

                text += `${'='.repeat(60)}\n`;
                text += `Xuất lúc: ${new Date().toLocaleString('vi-VN')}\n`;
                text += `✦ Thành Lợi AI Pro v3.0`;

                const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `thanhloi_chat_${new Date().toISOString().slice(0,10)}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                showToast('✅ Đã xuất cuộc trò chuyện!', 'success');
            }

            // ============================================================
            // CLEAR MESSAGES
            // ============================================================
            function clearMessages() {
                if (state.currentIndex < 0) {
                    showToast('⚠️ Không có cuộc trò chuyện nào', 'warning');
                    return;
                }
                if (state.currentHistory.length === 0) {
                    showToast('📭 Không có tin nhắn để xóa', 'warning');
                    return;
                }
                if (!confirm('🗑️ Xóa tất cả tin nhắn trong cuộc trò chuyện này?')) return;

                state.currentHistory = [];
                state.conversations[state.currentIndex].history = [];
                state.codeBlocks = {};
                state.codeIdCounter = 0;
                saveData();
                renderChat();
                renderConvList();
                showToast('🗑️ Đã xóa tất cả tin nhắn', 'info');
            }

            // ============================================================
            // AUTO-RESIZE
            // ============================================================
            function autoResize() {
                chatInput.style.height = 'auto';
                const newHeight = Math.min(chatInput.scrollHeight, 100);
                chatInput.style.height = newHeight + 'px';
            }

            // ============================================================
            // KEYBOARD SHORTCUTS
            // ============================================================
            function handleKeyboardShortcuts(e) {
                if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                    e.preventDefault();
                    sendMessage();
                }
                if (e.key === 'Escape') {
                    closeMobileSidebar();
                    if (state.pendingImages.length > 0) {
                        clearPendingImages();
                        showToast('🗑️ Đã xóa ảnh đang chọn', 'info');
                    }
                }
                if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
                    e.preventDefault();
                    newChat();
                }
                if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 'D') {
                    e.preventDefault();
                    clearMessages();
                }
            }

            // ============================================================
            // INIT
            // ============================================================
            document.addEventListener('DOMContentLoaded', () => {
                if (document.readyState === 'complete') {
                    hideLoading();
                } else {
                    window.addEventListener('load', hideLoading);
                    setTimeout(hideLoading, 2000);
                }

                const hasData = loadData();

                try {
                    const collapsed = localStorage.getItem('thanhloi_sidebar_collapsed');
                    if (collapsed !== null) {
                        state.isSidebarCollapsed = JSON.parse(collapsed);
                        if (state.isSidebarCollapsed && window.innerWidth > 768) {
                            sidebar.classList.add('collapsed');
                            toggleIcon.className = 'fas fa-chevron-right';
                        }
                    }
                } catch (e) {}

                renderModelSelector();
                updateModelUI();

                if (hasData && state.conversations.length > 0) {
                    if (state.currentIndex < 0 || state.currentIndex >= state.conversations.length) {
                        state.currentIndex = 0;
                    }
                    if (state.currentHistory.length === 0 && state.conversations[state.currentIndex]) {
                        state.currentHistory = state.conversations[state.currentIndex].history.slice();
                    }
                    renderChat();
                    renderConvList();
                } else {
                    state.conversations = [];
                    state.currentIndex = -1;
                    state.currentHistory = [];
                    newChat();
                }

                chatInput.addEventListener('input', () => {
                    autoResize();
                    updateCharCount();
                });
                
                chatInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        sendMessage();
                    }
                });

                document.addEventListener('keydown', handleKeyboardShortcuts);

                // Drag and drop support for images
                document.addEventListener('dragover', (e) => {
                    e.preventDefault();
                });
                document.addEventListener('drop', (e) => {
                    e.preventDefault();
                    const files = e.dataTransfer.files;
                    if (files.length > 0) {
                        const input = new DataTransfer();
                        for (const file of files) {
                            if (CONFIG.ALLOWED_IMAGE_TYPES.includes(file.type)) {
                                input.items.add(file);
                            }
                        }
                        imageUpload.files = input.files;
                        handleImageUpload({ target: imageUpload });
                    }
                });

                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        if (window.innerWidth > 768 && state.isMobileSidebarOpen) {
                            closeMobileSidebar();
                        }
                        if (window.innerWidth <= 768) {
                            sidebar.classList.remove('collapsed');
                        } else if (state.isSidebarCollapsed) {
                            sidebar.classList.add('collapsed');
                            toggleIcon.className = 'fas fa-chevron-right';
                        }
                    }, 200);
                });

                let lastTouchEnd = 0;
                document.addEventListener('touchend', (e) => {
                    const now = Date.now();
                    if (now - lastTouchEnd <= 300) {
                        e.preventDefault();
                    }
                    lastTouchEnd = now;
                }, { passive: false });

                window.addEventListener('beforeunload', () => {
                    saveCurrentConversation();
                });

                document.addEventListener('visibilitychange', () => {
                    if (document.hidden) {
                        saveCurrentConversation();
                    }
                });

                setTimeout(() => chatInput.focus(), 300);

                console.log('✦ Thành Lợi AI Pro v3.0 loaded successfully!');
                console.log(`📊 ${state.conversations.length} conversations, ${state.currentHistory.length} messages`);
                console.log(`🤖 Current model: ${getModelDisplay(state.currentModel).name}`);
                console.log(`📸 Image support: ENABLED (${CONFIG.ALLOWED_IMAGE_TYPES.length} formats)`);
            });

            // ============================================================
            // EXPOSE GLOBALS
            // ============================================================
            window.toggleSidebar = toggleSidebar;
            window.toggleMobileSidebar = toggleMobileSidebar;
            window.closeMobileSidebar = closeMobileSidebar;
            window.newChat = newChat;
            window.loadConversation = loadConversation;
            window.deleteConversation = deleteConversation;
            window.sendMessage = sendMessage;
            window.clearMessages = clearMessages;
            window.exportChat = exportChat;
            window.copyCode = copyCode;
            window.switchModel = switchModel;
            window.clearAllData = clearAllData;
            window.clearInput = clearInput;
            window.showToast = showToast;
            window.handleImageUpload = handleImageUpload;
            window.removePendingImage = removePendingImage;
            window.clearPendingImages = clearPendingImages;

        })();
    </script>
</body>
</html>
