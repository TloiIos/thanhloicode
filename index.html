<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>AURORA V50 - CLOUD ADMIN</title>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Segoe UI', monospace; text-align: center; padding-top: 50px; }
        .panel { 
            border: 2px solid #00ffcc; display: inline-block; padding: 30px; 
            border-radius: 15px; box-shadow: 0 0 20px #00ffcc; background: #0a0a0a; 
        }
        h1 { text-shadow: 0 0 10px #00ffcc; letter-spacing: 3px; margin-bottom: 5px; }
        .sub { font-size: 12px; color: #666; margin-bottom: 25px; }
        input, select { 
            background: #000; border: 1px solid #00ffcc; color: #00ffcc; 
            padding: 12px; width: 280px; border-radius: 5px; margin: 8px 0; outline: none; 
        }
        button { 
            background: #00ffcc; color: #000; border: none; padding: 12px 30px; 
            font-weight: bold; cursor: pointer; border-radius: 5px; transition: 0.3s; margin-top: 15px;
        }
        button:hover { background: #00b38f; box-shadow: 0 0 15px #00ffcc; transform: scale(1.05); }
        #status { margin-top: 20px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>
    <div class="panel">
        <h1>AURORA V50</h1>
        <div class="sub">CLOUD KEY MANAGEMENT SYSTEM</div>
        
        <input type="text" id="key" placeholder="NHẬP TÊN KEY (VÍ DỤ: LOI_VIP_01)"><br>
        
        <select id="duration">
            <option value="1">Gia hạn: 1 Ngày</option>
            <option value="7">Gia hạn: 7 Ngày</option>
            <option value="30" selected>Gia hạn: 30 Ngày</option>
            <option value="365">Gia hạn: 1 Năm</option>
            <option value="9999">Gia hạn: Vĩnh viễn</option>
        </select><br>

        <button onclick="addKey()">KÍCH HOẠT & GIA HẠN</button>
        <div id="status"></div>
    </div>

    <script>
        // LỢI THAY LINK FIREBASE CỦA LỢI VÀO ĐÂY
        const DB_URL = "https://thanhloi-mode-default-rtdb.asia-southeast1.firebasedatabase.app//keys.json";

        async function addKey() {
            const key = document.getElementById('key').value.trim();
            const days = parseInt(document.getElementById('duration').value);
            const status = document.getElementById('status');

            if(!key) return alert("Admin ơi, nhập tên Key trước đã!");

            status.style.color = "#f1c40f";
            status.innerText = "⏳ Đang kết nối Server...";

            // Tính ngày hết hạn
            let expireDate = new Date();
            expireDate.setDate(expireDate.getDate() + days);
            const expireString = days > 5000 ? "Vĩnh viễn" : expireDate.toLocaleString('vi-VN');

            try {
                const response = await fetch(DB_URL, {
                    method: "PATCH",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        [key]: {
                            "rank": "VIP",
                            "status": "Active",
                            "created_at": new Date().toLocaleString('vi-VN'),
                            "expired_at": expireString,
                            "days_added": days
                        }
                    })
                });

                if(response.ok) {
                    status.style.color = "#00ffcc";
                    status.innerHTML = `✅ THÀNH CÔNG!<br>Key: ${key}<br>Hết hạn: ${expireString}`;
                    document.getElementById('key').value = ""; 
                } else {
                    throw new Error("Server Firebase từ chối!");
                }
            } catch(e) {
                status.style.color = "#ff4444";
                status.innerText = "❌ LỖI: Không thể kết nối Cloud!";
            }
        }
    </script>
</body>
</html>
